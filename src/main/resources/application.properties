# ==================== MySQL Database Configuration ====================
spring.datasource.url=jdbc:mysql://localhost:3306/guru_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==================== Server Configuration ====================
# Bind ke semua interface (0.0.0.0) agar bisa diakses dari device lain
server.address=0.0.0.0
server.port=8082

# ==================== CORS Configuration ====================
# CORS Origins: Daftar URL yang diizinkan mengakses API
# Format: comma-separated list (tanpa spasi)
# Default: localhost, jika ingin tambah origin lain, set via environment variable
# Contoh environment variable: CORS_ALLOWED_ORIGINS=http://localhost:5173,http://192.168.1.10:3000
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8000,http://localhost:8082}

# ==================== Format SQL di Console ====================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


